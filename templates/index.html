<!DOCTYPE html>
<html>
<head>
    <title>Painel Diretoria</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>FALTANTES</h1>

<div class="filtro">
    Mês:
    <select id="mes">
        <option value="1">Jan</option>
        <option value="2">Fev</option>
        <option value="3">Mar</option>
        <option value="4">Abr</option>
        <option value="5">Mai</option>
        <option value="6">Jun</option>
        <option value="7">Jul</option>
        <option value="8">Ago</option>
        <option value="9">Set</option>
        <option value="10">Out</option>
        <option value="11">Nov</option>
        <option value="12">Dez</option>
    </select>
</div>

<div class="painel">

    <div class="coluna esquerda">
        <h2>1º TURNO</h2>
        <div class="kpi" id="kpi1T"></div>
        <div id="cruz1"></div>
    </div>

    <div class="coluna">
        <h2>2º TURNO</h2>
        <div class="kpi" id="kpi2T"></div>
        <div id="cruz2"></div>
    </div>

</div>

<script>

function bloco(dia,obj){

    let classe = obj.aberto > 0 ? "critico" : "ok";

    return `
    <div class="bloco ${classe}">
        <div class="dia">${dia}</div>

        <div class="diag">
            <div class="total">T: ${obj.total || 0}</div>
            <div class="aberto">A: ${obj.aberto || 0}</div>
        </div>

        <div class="debito">R$ ${obj.debito || 0}</div>
    </div>`;
}

function linha(lista,dados){
    return `<div class="linha">${lista.map(d => bloco(d,dados[d] || {})).join("")}</div>`;
}

function montar(dados, destino){

    if(!dados) return;

    let html="";
    html += linha([1,2,3],dados);
    html += linha([4,5,6],dados);
    html += linha([7,8,9,10,11,12,13,14,15],dados);
    html += linha([16,17,18,19,20,21,22,23,24],dados);
    html += linha([25,26,27],dados);
    html += linha([28,29,30],dados);
    html += linha([31],dados);

    document.getElementById(destino).innerHTML = html;
}

function calcularKPI(dados){

    let total=0, aberto=0, debito=0;

    if (!dados) return {total:0, aberto:0, debito:0};

    Object.values(dados).forEach(d=>{
        total += d?.total || 0;
        aberto += d?.aberto || 0;
        debito += d?.debito || 0;
    });

    return {total, aberto, debito};
}

function atualizar(){

    let mes = document.getElementById("mes").value;

    fetch(`/dados?mes=${mes}`)
    .then(r => r.json())
    .then(data => {

        if (!data) return;

        montar(data["1T"] || {}, "cruz1");
        montar(data["2T"] || {}, "cruz2");

        let k1 = calcularKPI(data["1T"]);
        let k2 = calcularKPI(data["2T"]);

        document.getElementById("kpi1T").innerHTML =
            `TOTAL: ${k1.total} | ABERTO: ${k1.aberto} | R$: ${k1.debito}`;

        document.getElementById("kpi2T").innerHTML =
            `TOTAL: ${k2.total} | A: ${k2.aberto} | R$: ${k2.debito}`;
    });
}

document.getElementById("mes").addEventListener("change", atualizar);

window.onload = () => atualizar();

// ✅ AUTO REFRESH 10 MIN
setInterval(atualizar, 50000);

</script>

</body>
</html>
